name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            nuget-

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage
          path: ./TestResults/**/coverage.cobertura.xml
          if-no-files-found: ignore

  coverage-regression:
    name: Coverage Regression
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      # Allow minimal run-to-run coverage noise while still blocking meaningful regressions.
      COVERAGE_ALLOWED_REGRESSION_PERCENT: '0.20'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            nuget-

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: global.json

      - name: Measure PR coverage
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release
          dotnet test tests/ZeeKayDa.Auth.Tests/ \
            --no-build --configuration Release \
            --collect:"XPlat Code Coverage" --results-directory ./TestResults/pr \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[ZeeKayDa.Auth]*"
          dotnet test tests/ZeeKayDa.Auth.AspNetCore.Tests/ \
            --no-build --configuration Release \
            --collect:"XPlat Code Coverage" --results-directory ./TestResults/pr \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[ZeeKayDa.Auth.AspNetCore]*"

      - name: Measure base-branch coverage
        run: |
          git worktree add ../coverage-base origin/${{ github.base_ref }}
          cd ../coverage-base
          dotnet restore
          dotnet build --no-restore --configuration Release
          dotnet test tests/ZeeKayDa.Auth.Tests/ \
            --no-build --configuration Release \
            --collect:"XPlat Code Coverage" --results-directory ./TestResults/base \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[ZeeKayDa.Auth]*"
          dotnet test tests/ZeeKayDa.Auth.AspNetCore.Tests/ \
            --no-build --configuration Release \
            --collect:"XPlat Code Coverage" --results-directory ./TestResults/base \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[ZeeKayDa.Auth.AspNetCore]*"

      - name: Check coverage regression
        run: dotnet run .github/scripts/check_coverage_regression.cs -- ./TestResults/pr ../coverage-base/TestResults/base

      - name: Clean up base-branch worktree
        if: always()
        run: git worktree remove --force ../coverage-base

  coverage-regression-script-tests:
    name: Coverage Regression Script Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            nuget-

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: global.json

      - name: Run coverage-regression script smoke tests
        run: bash .github/scripts/tests/check_coverage_regression.tests.sh

  log-hygiene:
    name: Log Hygiene Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check log hygiene
        run: bash .github/scripts/check_log_hygiene.sh

  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Check formatting
        run: dotnet format --verify-no-changes
