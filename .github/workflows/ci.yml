name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'

permissions:
  contents: read

env:
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build-and-test:
    name: Build and Test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj', '**/global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: global.json

      # Platform-specific provider packages (ZeeKayDa.Auth.Windows today) have no business being
      # built or tested on any OS but their own. ZeeKayDa.Auth.FileSystem (#291) is the exception:
      # it is a portable, cross-platform provider (no P/Invoke, no OS-specific TFM — ADR 0012
      # Amendment 2) and must build and test on every runner OS, so it appears in all three .slnf
      # files below. ZeeKayDa.Auth.slnx remains the single canonical solution — these are thin
      # solution *filters* (no duplicated project metadata) selecting which projects apply to each
      # runner OS, so a platform-specific package never gets pulled onto the wrong platform's leg.
      - name: Select solution
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Windows) echo "SOLUTION=ZeeKayDa.Auth.Windows.slnf" >> "$GITHUB_ENV" ;;
            macOS)   echo "SOLUTION=ZeeKayDa.Auth.MacOS.slnf" >> "$GITHUB_ENV" ;;
            Linux)   echo "SOLUTION=ZeeKayDa.Auth.Linux.slnf" >> "$GITHUB_ENV" ;;
          esac

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore --configuration Release

      - name: Test
        run: dotnet test ${{ env.SOLUTION }} --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload coverage-${{ matrix.os }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-${{ runner.os }}
          path: ./TestResults/**/coverage.cobertura.xml
          if-no-files-found: ignore

      - name: Coverage summary
        run: dotnet run .github/scripts/summarize_coverage.cs -- ./TestResults

  coverage-regression:
    name: Coverage Regression
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      # Allow minimal run-to-run coverage noise while still blocking meaningful regressions.
      COVERAGE_ALLOWED_REGRESSION_PERCENT: '0.20'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj', '**/global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: global.json

      - name: Measure PR coverage
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release
          dotnet test tests/ZeeKayDa.Auth.Tests/ \
            --no-build --configuration Release \
            --collect:"XPlat Code Coverage" --results-directory ./TestResults/pr \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[ZeeKayDa.Auth]*"
          dotnet test tests/ZeeKayDa.Auth.AspNetCore.Tests/ \
            --no-build --configuration Release \
            --collect:"XPlat Code Coverage" --results-directory ./TestResults/pr \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[ZeeKayDa.Auth.AspNetCore]*"
          dotnet test tests/ZeeKayDa.Auth.AzureKeyVault.Tests/ \
            --no-build --configuration Release \
            --collect:"XPlat Code Coverage" --results-directory ./TestResults/pr \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[ZeeKayDa.Auth.AzureKeyVault]*"
          dotnet test tests/ZeeKayDa.Auth.FileSystem.Tests/ \
            --no-build --configuration Release \
            --collect:"XPlat Code Coverage" --results-directory ./TestResults/pr \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[ZeeKayDa.Auth.FileSystem]*"

      - name: Measure base-branch coverage
        run: |
          git worktree add ../coverage-base origin/${{ github.base_ref }}
          cd ../coverage-base
          dotnet restore
          dotnet build --no-restore --configuration Release
          dotnet test tests/ZeeKayDa.Auth.Tests/ \
            --no-build --configuration Release \
            --collect:"XPlat Code Coverage" --results-directory ./TestResults/base \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[ZeeKayDa.Auth]*"
          dotnet test tests/ZeeKayDa.Auth.AspNetCore.Tests/ \
            --no-build --configuration Release \
            --collect:"XPlat Code Coverage" --results-directory ./TestResults/base \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[ZeeKayDa.Auth.AspNetCore]*"
          dotnet test tests/ZeeKayDa.Auth.AzureKeyVault.Tests/ \
            --no-build --configuration Release \
            --collect:"XPlat Code Coverage" --results-directory ./TestResults/base \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[ZeeKayDa.Auth.AzureKeyVault]*"
          dotnet test tests/ZeeKayDa.Auth.FileSystem.Tests/ \
            --no-build --configuration Release \
            --collect:"XPlat Code Coverage" --results-directory ./TestResults/base \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[ZeeKayDa.Auth.FileSystem]*"

      - name: Check coverage regression
        run: dotnet run .github/scripts/check_coverage_regression.cs -- ./TestResults/pr ../coverage-base/TestResults/base

      - name: Clean up base-branch worktree
        if: always()
        run: git worktree remove --force ../coverage-base

  coverage-regression-script-tests:
    name: Coverage Regression Script Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj', '**/global.json') }}
          restore-keys: |
            nuget-

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: global.json

      - name: Run coverage-regression script smoke tests
        run: bash .github/scripts/tests/check_coverage_regression.tests.sh

      - name: Run coverage-summary script smoke tests
        run: bash .github/scripts/tests/summarize_coverage.tests.sh

  log-hygiene:
    name: Log Hygiene Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check log hygiene
        run: bash .github/scripts/check_log_hygiene.sh

  log-hygiene-script-tests:
    name: Log Hygiene Script Tests
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run log hygiene script smoke tests
        run: bash .github/scripts/tests/check_log_hygiene.tests.sh

  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Check formatting
        # Explicit path required: with the per-OS ZeeKayDa.Auth.*.slnf filters alongside
        # ZeeKayDa.Auth.slnx, `dotnet format`'s auto-discovery (unlike restore/build/test, which
        # ignore .slnf files when no path is given) sees multiple candidate solution files and
        # errors. ZeeKayDa.Auth.slnx is the canonical, unfiltered solution, so it's the right one
        # to format-check in full — this job runs on ubuntu-latest only and, unlike execution/tests,
        # formatting analysis of ZeeKayDa.Auth.Windows's source builds and checks fine cross-platform.
        run: dotnet format ZeeKayDa.Auth.slnx --verify-no-changes

  ci-complete:
    name: CI Complete
    needs: [build-and-test, coverage-regression, coverage-regression-script-tests, log-hygiene, log-hygiene-script-tests, format-check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi
