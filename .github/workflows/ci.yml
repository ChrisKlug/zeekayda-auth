name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'

permissions:
  contents: read

env:
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build-and-test:
    name: Build and Test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj', '**/global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: global.json

      # Platform-specific provider packages (ZeeKayDa.Auth.Windows today) have no business being
      # built or tested on any OS but their own. ZeeKayDa.Auth.FileSystem (#291) is the exception:
      # it is a portable, cross-platform provider (no P/Invoke, no OS-specific TFM — ADR 0012
      # Amendment 2) and must build and test on every runner OS, so it appears in all three .slnf
      # files below. ZeeKayDa.Auth.slnx remains the single canonical solution — these are thin
      # solution *filters* (no duplicated project metadata) selecting which projects apply to each
      # runner OS, so a platform-specific package never gets pulled onto the wrong platform's leg.
      - name: Select solution
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Windows) echo "SOLUTION=ZeeKayDa.Auth.Windows.slnf" >> "$GITHUB_ENV" ;;
            macOS)   echo "SOLUTION=ZeeKayDa.Auth.MacOS.slnf" >> "$GITHUB_ENV" ;;
            Linux)   echo "SOLUTION=ZeeKayDa.Auth.Linux.slnf" >> "$GITHUB_ENV" ;;
          esac

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore --configuration Release

      - name: Test
        run: dotnet test ${{ env.SOLUTION }} --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload coverage-${{ matrix.os }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-${{ runner.os }}
          path: ./TestResults/**/coverage.cobertura.xml
          if-no-files-found: ignore

      - name: Coverage summary
        run: dotnet run .github/scripts/summarize_coverage.cs -- ./TestResults "${{ runner.os }}"

  coverage-regression:
    name: Coverage Regression
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      actions: read
    env:
      # Allow minimal run-to-run coverage noise while still blocking meaningful regressions.
      COVERAGE_ALLOWED_REGRESSION_PERCENT: '0.20'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj', '**/global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: global.json

      - name: Measure PR coverage
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release

          # Packages are discovered from ZeeKayDa.Auth.slnx rather than hardcoded here, so a new
          # cross-platform signing-provider package (epic #282) gets covered automatically as soon
          # as it follows the tests/<Package>.Tests/ convention — see discover_coverage_projects.cs.
          while IFS= read -r package; do
            dotnet test "tests/${package}.Tests/" \
              --no-build --configuration Release \
              --collect:"XPlat Code Coverage" --results-directory ./TestResults/pr \
              -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[${package}]*"
          done < <(dotnet run .github/scripts/discover_coverage_projects.cs -- .)

      # Rather than rebuild and retest the base branch from a git worktree (slow, and re-executes
      # the base branch's own test suite — including its own coverage-regression-script smoke
      # tests — as a side effect), reuse the coverage already produced by build-and-test's most
      # recent successful run on the base branch. That job already uploads a per-OS
      # coverage.cobertura.xml artifact on every push, scoped per-package the same way this job's
      # own Include-filtered measurement is (see the per-project coverage.runsettings files), so
      # its Linux artifact is equivalent input for this comparison without rerunning anything.
      - name: Find latest successful build on ${{ github.base_ref }}
        id: base-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id=$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?branch=${{ github.base_ref }}&event=push&status=success&per_page=1" --jq '.workflow_runs[0].id')

          if [[ -z "${run_id}" || "${run_id}" == "null" ]]; then
            echo "::error::No successful CI run found on ${{ github.base_ref }}"
            exit 1
          fi

          echo "Using base-branch coverage from run ${run_id}"
          echo "run-id=${run_id}" >> "$GITHUB_OUTPUT"

      - name: Download base-branch coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-Linux
          github-token: ${{ github.token }}
          run-id: ${{ steps.base-run.outputs.run-id }}
          path: ./TestResults/base

      - name: Check coverage regression
        run: dotnet run .github/scripts/check_coverage_regression.cs -- ./TestResults/pr ./TestResults/base

  coverage-regression-script-tests:
    name: Coverage Regression Script Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj', '**/global.json') }}
          restore-keys: |
            nuget-

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: global.json

      - name: Run coverage-regression script smoke tests
        run: bash .github/scripts/tests/check_coverage_regression.tests.sh

      - name: Run coverage-summary script smoke tests
        run: bash .github/scripts/tests/summarize_coverage.tests.sh

      - name: Run coverage-project-discovery script smoke tests
        run: bash .github/scripts/tests/discover_coverage_projects.tests.sh

  log-hygiene:
    name: Log Hygiene Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check log hygiene
        run: bash .github/scripts/check_log_hygiene.sh

  log-hygiene-script-tests:
    name: Log Hygiene Script Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run log hygiene script smoke tests
        run: bash .github/scripts/tests/check_log_hygiene.tests.sh

  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Check formatting
        # Explicit path required: with the per-OS ZeeKayDa.Auth.*.slnf filters alongside
        # ZeeKayDa.Auth.slnx, `dotnet format`'s auto-discovery (unlike restore/build/test, which
        # ignore .slnf files when no path is given) sees multiple candidate solution files and
        # errors. ZeeKayDa.Auth.slnx is the canonical, unfiltered solution, so it's the right one
        # to format-check in full — this job runs on ubuntu-latest only and, unlike execution/tests,
        # formatting analysis of ZeeKayDa.Auth.Windows's source builds and checks fine cross-platform.
        run: dotnet format ZeeKayDa.Auth.slnx --verify-no-changes

  ci-complete:
    name: CI Complete
    needs: [build-and-test, coverage-regression, coverage-regression-script-tests, log-hygiene, log-hygiene-script-tests, format-check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi
