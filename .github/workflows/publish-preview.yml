name: Publish Preview

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  publish-preview:
    name: Publish Preview to GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            nuget-

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Determine version
        id: version
        run: |
          BASE=$(grep -oP '(?<=<VersionPrefix>)[^<]+' Directory.Build.props || grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          echo "package_version=${BASE}-preview.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: dotnet pack --configuration Release --no-build -p:PackageVersion="$PACKAGE_VERSION" --include-symbols -p:SymbolPackageFormat=snupkg --output ./nupkgs

      - name: Push to GitHub Packages
        run: dotnet nuget push ./nupkgs/*.nupkg --source https://nuget.pkg.github.com/ChrisKlug/index.json --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

      - name: Push symbols to GitHub Packages
        run: dotnet nuget push ./nupkgs/*.snupkg --source https://nuget.pkg.github.com/ChrisKlug/index.json --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
