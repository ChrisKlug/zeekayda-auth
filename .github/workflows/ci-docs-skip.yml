name: CI (docs skip)

# This workflow exists solely to satisfy the "CI Complete" required status check
# when a PR or push contains only docs/** changes.
#
# GitHub treats a skipped workflow (via paths-ignore) as a missing required check,
# which blocks merging. The companion ci.yml uses paths-ignore to skip the real
# build jobs for docs-only changes. This workflow produces the single "CI Complete"
# check that branch protection requires, immediately passing — keeping branch
# protection happy without wasting CI minutes on a .NET build.

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
  push:
    branches: [main]
    paths:
      - 'docs/**'

permissions:
  contents: read

jobs:
  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    steps:
      - name: Docs-only change — skipping CI
        run: echo "Docs-only change detected. CI skipped."
