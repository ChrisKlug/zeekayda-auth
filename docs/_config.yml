title: ZeeKayDa.Auth
description: "OpenID Connect identity provider framework for .NET"
url: "https://zeekayda.com"
baseurl: ""

# Theme — remote only; no Gemfile or local Ruby toolchain required.
remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Heading anchors
heading_anchors: true

# "Edit this page on GitHub" link
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/ChrisKlug/zeekayda-auth"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

# Header auxiliary links
aux_links:
  "GitHub":
    - "https://github.com/ChrisKlug/zeekayda-auth"
aux_links_new_tab: true

# Footer
footer_content: >
  ZeeKayDa.Auth is open-source software released under the
  <a href="https://github.com/ChrisKlug/zeekayda-auth/blob/main/LICENSE">MIT licence</a>.

# Callout blocks
callouts_level: quiet
callouts:
  warning:
    title: Warning
    color: red
  tip:
    title: Tip
    color: green
  note:
    title: Note
    color: blue

# Exclude internal architecture decision records from the built site.
# ADRs in docs/decisions/ are for contributors, not end-users.
exclude:
  - decisions
